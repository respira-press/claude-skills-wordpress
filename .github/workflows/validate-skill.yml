name: Validate Skill Submission

on:
  pull_request:
    paths:
      - 'skills/**/SKILL.md'
      - 'skills/**/references/**'
      - 'skills/**/scripts/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/validate-skill.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skill folder structure
        run: |
          set -euo pipefail
          test -d skills || { echo "Missing skills/ directory"; exit 1; }

          for dir in skills/*/ ; do
            skill_dir="${dir%/}"
            if [ ! -f "$skill_dir/SKILL.md" ]; then
              echo "Missing SKILL.md in $skill_dir"
              exit 1
            fi

            if grep -qE '^---$' "$skill_dir/SKILL.md"; then
              :
            else
              echo "Missing YAML frontmatter delimiter in $skill_dir/SKILL.md"
              exit 1
            fi

            if [ -f "$skill_dir/README.md" ]; then
              echo "Disallowed: $skill_dir/README.md (move details into references/)"
              exit 1
            fi

            if [ -f "$skill_dir/metadata.json" ]; then
              echo "Disallowed: $skill_dir/metadata.json (use YAML frontmatter in SKILL.md)"
              exit 1
            fi
          done

      - name: Check SKILL.md frontmatter keys
        run: |
          set -euo pipefail
          for skill in skills/*/SKILL.md; do
            echo "Checking $skill"
            head -n 40 "$skill" | grep -q '^name:' || { echo "Missing name: in $skill"; exit 1; }
            head -n 40 "$skill" | grep -q '^description:' || { echo "Missing description: in $skill"; exit 1; }
            head -n 40 "$skill" | grep -q '^license:' || { echo "Missing license: in $skill"; exit 1; }
          done
